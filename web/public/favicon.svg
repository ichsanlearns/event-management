<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Deep navy blue background -->
  <rect width="64" height="64" fill="#1E3A8A"/>
  
  <!-- 3x3 grid of seat squares - white, evenly spaced -->
  <!-- Row 1 -->
  <rect x="14" y="14" width="10" height="10" rx="2" fill="white"/>
  <rect x="27" y="14" width="10" height="10" rx="2" fill="white"/>
  <rect x="40" y="14" width="10" height="10" rx="2" fill="white"/>
  
  <!-- Row 2 -->
  <rect x="14" y="27" width="10" height="10" rx="2" fill="white"/>
  <rect x="27" y="27" width="10" height="10" rx="2" fill="white"/>
  <rect x="40" y="27" width="10" height="10" rx="2" fill="white"/>
  
  <!-- Row 3 -->
  <rect x="14" y="40" width="10" height="10" rx="2" fill="white"/>
  <rect x="27" y="40" width="10" height="10" rx="2" fill="white"/>
  <rect x="40" y="40" width="10" height="10" rx="2" fill="white"/>
</svg>
